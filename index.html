<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGL Sender Premium Executor</title>
    <style>
        :root {
            --glass-bg: rgba(10, 10, 14, 0.88);
            --glass-border: rgba(255, 255, 255, 0.06);
            --glass-border-active: rgba(255, 255, 255, 0.18);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.45);
            --text-placeholder: rgba(255, 255, 255, 0.15);
            --accent-glow: rgba(255, 65, 108, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
        }

        body { 
            background: #010103;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            padding: 24px;
            perspective: 1400px;
        }

        .mesh-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            background: radial-gradient(circle at 50% 50%, #050512 0%, #010103 100%);
        }

        .premium-pill {
            position: relative;
            z-index: 10;
            padding: 12px 28px;
            background: rgba(15, 15, 20, 0.95);
            border-radius: 99px;
            color: #ffffff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 
                0 0 20px var(--accent-glow),
                0 10px 30px rgba(0, 0, 0, 0.6),
                inset 1.5px 1.5px 2px rgba(255, 255, 255, 0.15),   
                inset -1.5px -1.5px 2px rgba(255, 255, 255, 0.03); 
            display: flex;
            align-items: center;
            gap: 8px;
            user-select: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .premium-pill:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(255, 65, 108, 0.25), 0 12px 35px rgba(0, 0, 0, 0.7);
        }

        .chevron-icon { transition: transform 0.3s ease; }
        .premium-pill.open .chevron-icon { transform: rotate(180deg); }

        .executor-panel {
            width: 100%;
            max-width: 580px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            margin-top: 15px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            display: flex;
            flex-direction: column;
            gap: 16px;
            z-index: 10;
            opacity: 0;
            transform: translateY(-10px) scale(0.96);
            pointer-events: none;
            visibility: hidden;
            height: 0; padding: 0; overflow: hidden; border-color: transparent;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            transform-style: preserve-3d;
        }

        .executor-panel.active {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
            visibility: visible;
            height: auto;
            padding: 24px;
            border-color: var(--glass-border);
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 12px;
        }

        .status-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        .status-dot {
            width: 6px; height: 6px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
        }

        .config-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .input-box {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .span-2 { grid-column: span 2; }

        label {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        input, textarea, select {
            width: 100%;
            padding: 11px 14px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            font-size: 13px;
            color: #ffffff;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--glass-border-active);
            background: rgba(0, 0, 0, 0.55);
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 6px;
            max-height: 80px;
            overflow-y: auto;
        }

        .tag {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 4px 10px;
            border-radius: 99px;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tag span { cursor: pointer; color: var(--text-muted); }
        .tag span:hover { color: #f87171; }

        .stats-dashboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            background: rgba(255,255,255,0.02);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.04);
        }

        .stat-card { text-align: center; }
        .stat-val { font-size: 16px; font-weight: 700; color: #ffffff; }
        .stat-lbl { font-size: 9px; color: var(--text-muted); text-transform: uppercase; margin-top: 2px; }

        .mode-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .mode-btn {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 8px 4px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
        }

        .mode-btn.active {
            background: rgba(255,255,255,0.08);
            color: #ffffff;
            border-color: var(--glass-border-active);
        }

        .control-actions {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 10px;
        }

        button.main-action {
            padding: 12px;
            font-weight: 600;
            font-size: 13px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border: none;
        }

        .btn-run { background: #ffffff; color: #000000; }
        .btn-run:hover { background: #e4e4e7; }
        .btn-pause { background: rgba(255,255,255,0.06); color: #ffffff; border: 1px solid var(--glass-border); }
        .btn-pause:hover { background: rgba(255,255,255,0.1); }
        .btn-stop { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        .btn-stop:hover { background: rgba(239, 68, 68, 0.25); }

        .utility-row {
            display: flex;
            justify-content: space-between;
            gap: 8px;
        }

        .util-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 6px 12px;
            font-size: 11px;
            border-radius: 8px;
            cursor: pointer;
        }

        .util-btn:hover { color: #ffffff; border-color: var(--glass-border-active); }

        #log {
            background: rgba(0, 0, 0, 0.55);
            padding: 12px;
            height: 120px;
            overflow-y: auto;
            font-family: ui-monospace, monospace;
            font-size: 11px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            color: var(--text-muted);
            white-space: pre-wrap;
            line-height: 1.5;
        }

        .toast-container {
            position: fixed;
            bottom: 24px; right: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
        }

        .toast {
            background: rgba(10, 10, 15, 0.95);
            border: 1px solid var(--glass-border-active);
            padding: 12px 20px;
            border-radius: 12px;
            color: #ffffff;
            font-size: 13px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .toast.show { transform: translateX(0); }
    </style>
</head>
<body>

    <div class="mesh-bg"></div>
    <div class="toast-container" id="toastContainer"></div>

    <div class="premium-pill" id="menuPill">
        <svg style="width:14px; height:14px; fill:currentColor;" viewBox="0 0 24 24">
            <path d="M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M19.43,12.97C19.47,12.65 19.5,12.33 19.5,12C19.5,11.67 19.47,11.34 19.43,11L21.54,9.37C21.73,9.22 21.78,8.95 21.66,8.73L19.66,5.27C19.54,5.05 19.27,4.96 19.05,5.05L16.56,6.05C16.04,5.66 15.47,5.34 14.86,5.08L14.47,2.42C14.43,2.18 14.22,2 13.97,2H9.97C9.72,2 9.51,2.18 9.47,2.42L9.08,5.08C8.47,5.34 7.9,5.66 7.38,6.05L4.89,5.05C4.67,4.96 4.4,5.05 4.28,5.27L2.28,8.73C2.16,8.95 2.21,9.22 2.4,9.37L4.51,11C4.47,11.34 4.5,11.67 4.5,12C4.5,12.33 4.47,12.65 4.51,13L2.4,14.63C2.21,14.78 2.16,15.05 2.28,15.27L4.28,18.73C4.4,18.95 4.67,19.04 4.89,18.95L7.38,17.95C7.9,18.34 8.47,18.66 9.08,18.92L9.47,21.58C9.51,21.82 9.72,22 9.97,22H13.97C14.22,22 14.43,21.82 14.47,21.58L14.86,18.92C15.47,18.66 16.04,18.34 16.56,17.95L19.05,18.95C19.27,19.04 19.54,18.95 19.66,18.73L21.66,15.27C21.78,15.05 21.73,14.78 21.54,14.63L19.43,12.97Z"/>
        </svg>
        <span>NGL Premium Control Deck</span>
        <svg class="chevron-icon" style="width:12px; height:12px; fill:currentColor;" viewBox="0 0 24 24">
            <path d="M7.41,8.58L12,13.17L16.59,8.58L18,10L12,16L6,10L7.41,8.58Z"/>
        </svg>
    </div>

    <div class="executor-panel" id="mainDeck">
        
        <div class="panel-header">
            <div class="status-wrapper">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusTxt">SYSTEM READY</span>
            </div>
            <div style="font-size: 11px; color: var(--text-muted);" id="charCounter">0 characters</div>
        </div>

        <div class="stats-dashboard">
            <div class="stat-card">
                <div class="stat-val" id="statSent">0</div>
                <div class="stat-lbl">Processed</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="statSuccess">100%</div>
                <div class="stat-lbl">Success Rate</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="statTimer">00:00:00</div>
                <div class="stat-lbl">Elapsed Time</div>
            </div>
        </div>

        <div class="config-grid">
            
            <div class="input-box span-2">
                <label>Target Identity Queue (Press Enter to Add)</label>
                <input type="text" id="usernameInput" placeholder="Add multiple users...">
                <div class="tags-container" id="tagsContainer"></div>
            </div>

            <div class="input-box span-2">
                <label>Messages List / Rotator Payloads (One per line)</label>
                <textarea id="messageInput" placeholder="Enter messages. System rotates through choices sequentially..." rows="3"></textarea>
            </div>

            <div class="input-box">
                <label>Proxy Settings (IP:PORT per line)</label>
                <textarea id="proxyInput" placeholder="Optional proxies list..." rows="2"></textarea>
            </div>

            <div class="input-box">
                <label>Loop Parameters Mode</label>
                <select id="loopMode">
                    <option value="normal">Normal Mode</option>
                    <option value="infinite">Infinite Loop Mode</option>
                    <option value="auto">Auto Loop (5 Cycles)</option>
                    <option value="schedule">Scheduled Run</option>
                </select>
            </div>

            <div class="input-box" id="scheduleBox" style="display:none;">
                <label>Execution Datetime Schedule</label>
                <input type="datetime-local" id="scheduleTime">
            </div>

            <div class="input-box" id="countBox">
                <label>Message Count</label>
                <input type="number" id="count" value="5" min="1" max="50">
            </div>

            <div class="input-box span-2">
                <label>Rate Limiting Velocity Engine</label>
                <div class="mode-container">
                    <div class="mode-btn" data-delay="3000">Slow</div>
                    <div class="mode-btn active" data-delay="1000">Normal</div>
                    <div class="mode-btn" data-delay="400">Fast</div>
                    <div class="mode-btn" data-delay="50">Insane</div>
                </div>
            </div>

        </div>

        <div class="control-actions">
            <button class="main-action btn-run" id="sendBtn">
                <svg style="width:14px; height:14px; fill:currentColor;" viewBox="0 0 24 24"><path d="M8,5V19L19,12L8,5Z"/></svg>
                Execute
            </button>
            <button class="main-action btn-pause" id="pauseBtn" disabled>Pause</button>
            <button class="main-action btn-stop" id="stopBtn" disabled>Stop</button>
        </div>

        <div class="utility-row">
            <div>
                <button class="util-btn" id="btnExport">Export JSON</button>
                <button class="util-btn" id="btnImport">Import JSON</button>
            </div>
            <div>
                <button class="util-btn" id="btnClearLogs">Clear</button>
                <button class="util-btn" id="btnDownloadLogs">Save Logs</button>
            </div>
        </div>

        <div class="input-box">
            <label>Console Interface Logs Window</label>
            <div id="log">System initialized. Ready to deploy pipelines.</div>
        </div>

    </div>

    <script>
        let usersList = [];
        let activeDelay = 1000;
        let isRunning = false;
        let isPaused = false;
        let totalSentCount = 0;
        let successfulSends = 0;
        let timerInterval = null;
        let secondsElapsed = 0;
        let globalMsgIndex = 0; 

        const deck = document.getElementById('mainDeck');
        const menuPill = document.getElementById('menuPill');
        const tagsContainer = document.getElementById('tagsContainer');
        const usernameInput = document.getElementById('usernameInput');
        const messageInput = document.getElementById('messageInput');
        const logDiv = document.getElementById('log');
        const sendBtn = document.getElementById('sendBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const stopBtn = document.getElementById('stopBtn');

        menuPill.onclick = () => {
            menuPill.classList.toggle('open');
            deck.classList.toggle('active');
        };

        window.addEventListener('mousemove', e => {
            if (!deck.classList.contains('active')) return;
            const xAxis = (window.innerWidth / 2 - e.clientX) / 60;
            const yAxis = (window.innerHeight / 2 - e.clientY) / 60;
            deck.style.transform = `rotateY(${-xAxis}deg) rotateX(${yAxis}deg)`;
        });

        window.addEventListener('mouseleave', () => {
            deck.style.transform = 'rotateY(0deg) rotateX(0deg)';
        });

        function createToast(text) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = text;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 50);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        function updateCharCount() {
            document.getElementById('charCounter').innerText = `${messageInput.value.length} characters`;
        }
        messageInput.oninput = updateCharCount;
        messageInput.onpaste = () => setTimeout(updateCharCount, 10);

        usernameInput.onkeydown = (e) => {
            if (e.key === 'Enter' && usernameInput.value.trim() !== '') {
                e.preventDefault();
                if (usersList.length >= 50) {
                    createToast('Queue limit reached (Max 50 targets)');
                    return;
                }
                const user = usernameInput.value.trim().replace('@', '');
                if (!usersList.includes(user)) {
                    usersList.push(user);
                    renderTags();
                }
                usernameInput.value = '';
            }
        };

        function renderTags() {
            tagsContainer.innerHTML = '';
            usersList.forEach((user, index) => {
                const tag = document.createElement('div');
                tag.className = 'tag';
                tag.innerHTML = `@${user} <span onclick="removeTag(${index})">&times;</span>`;
                tagsContainer.appendChild(tag);
            });
        }

        window.removeTag = (index) => {
            usersList.splice(index, 1);
            renderTags();
        };

        function syncLoopModeUI(modeValue) {
            document.getElementById('scheduleBox').style.display = modeValue === 'schedule' ? 'flex' : 'none';
            document.getElementById('countBox').style.display = (modeValue === 'infinite' || modeValue === 'auto') ? 'none' : 'flex';
        }

        document.getElementById('loopMode').onchange = (e) => syncLoopModeUI(e.target.value);

        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeDelay = parseInt(btn.getAttribute('data-delay'));
                createToast(`Velocity set to ${btn.innerText} interval`);
            };
        });

        document.getElementById('btnExport').onclick = () => {
            const config = {
                users: usersList,
                messages: messageInput.value,
                proxies: document.getElementById('proxyInput').value,
                loopMode: document.getElementById('loopMode').value,
                count: document.getElementById('count').value,
                delay: activeDelay
            };
            const blob = new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'ngl_executor_config.json';
            a.click();
            createToast('Configuration JSON exported');
        };

        document.getElementById('btnImport').onclick = () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const config = JSON.parse(event.target.result);
                        if (config.users) usersList = config.users;
                        if (config.messages) messageInput.value = config.messages;
                        if (config.proxies) document.getElementById('proxyInput').value = config.proxies;
                        if (config.loopMode) {
                            document.getElementById('loopMode').value = config.loopMode;
                            syncLoopModeUI(config.loopMode);
                        }
                        if (config.count) document.getElementById('count').value = config.count;
                        renderTags();
                        updateCharCount();
                        createToast('Configuration JSON loaded successfully');
                    } catch (err) {
                        createToast('Error: Invalid JSON payload structure');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        };

        document.getElementById('btnClearLogs').onclick = () => {
            logDiv.innerHTML = 'Logs cleared.';
            createToast('Logs workspace wiped clean');
        };

        document.getElementById('btnDownloadLogs').onclick = () => {
            const blob = new Blob([logDiv.innerText], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'ngl_execution_history.txt';
            a.click();
        };

        window.onkeydown = (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                sendBtn.click();
            }
            if (e.key === 'Escape' && isRunning) {
                stopBtn.click();
            }
        };

        const sleep = ms => new Promise(res => setTimeout(res, ms));

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!isPaused && isRunning) {
                    secondsElapsed++;
                    const hrs = String(Math.floor(secondsElapsed / 3600)).padStart(2, '0');
                    const mins = String(Math.floor((secondsElapsed % 3600) / 60)).padStart(2, '0');
                    const secs = String(secondsElapsed % 60).padStart(2, '0');
                    document.getElementById('statTimer').innerText = `${hrs}:${mins}:${secs}`;
                }
            }, 1000);
        }

        function writeToLog(text) {
            logDiv.innerHTML += "\n" + text;
            logDiv.scrollTop = logDiv.scrollHeight; 
        }

        pauseBtn.onclick = () => {
            isPaused = !isPaused;
            pauseBtn.innerText = isPaused ? 'Resume' : 'Pause';
            document.getElementById('statusTxt').innerText = isPaused ? 'PIPELINE PAUSED' : 'TRANSMITTING';
            document.getElementById('statusDot').style.background = isPaused ? '#fbbf24' : '#10b981';
        };

        stopBtn.onclick = () => {
            if (document.getElementById('loopMode').value === 'infinite') {
                if (!confirm('Are you sure you want to terminate the infinite thread run?')) return;
            }
            isRunning = false;
            isPaused = false;
            clearInterval(timerInterval);
            document.getElementById('statusTxt').innerText = 'RUN CANCELLED';
            document.getElementById('statusDot').style.background = '#ef4444';
            sendBtn.disabled = false;
            pauseBtn.disabled = true;
            stopBtn.disabled = true;
            pauseBtn.innerText = 'Pause';
        };

        sendBtn.onclick = async () => {
            const rawMessages = messageInput.value.split('\n').filter(m => m.trim() !== '');
            const rawProxies = document.getElementById('proxyInput').value.split('\n').filter(p => p.trim() !== '');
            const mode = document.getElementById('loopMode').value;
            
            if (usersList.length === 0 || rawMessages.length === 0) {
                logDiv.innerHTML = '❌ Operational Failure: User list queue or Message payload inputs are missing.';
                return;
            }

            // Fix 7: Reset Stats cleanly per session initialization
            totalSentCount = 0;
            successfulSends = 0;
            secondsElapsed = 0;
            document.getElementById('statSent').innerText = '0';
            document.getElementById('statSuccess').innerText = '100%';
            document.getElementById('statTimer').innerText = '00:00:00';

            if (mode === 'schedule') {
                const schedVal = document.getElementById('scheduleTime').value;
                if (!schedVal) {
                    logDiv.innerHTML = '❌ Select schedule datetime timestamp first.';
                    return;
                }
                let diff = new Date(schedVal).getTime() - Date.now();
                if (diff > 0) {
                    logDiv.innerHTML = `⏳ Execution pipeline scheduled. Waiting ${Math.round(diff/1000)}s...`;
                    while (diff > 0) {
                        if (!isRunning) return; 
                        await sleep(1000);
                        diff = new Date(schedVal).getTime() - Date.now();
                    }
                }
            }

            // Fix 1 & 2: Correcting boundary rules parameters configurations
            let isInfinite = (mode === 'infinite');
            let targetCount = isInfinite ? 0 : parseInt(document.getElementById('count').value);
            if (mode === 'auto') {
                targetCount = 5 * usersList.length; 
            }

            isRunning = true;
            isPaused = false;
            sendBtn.disabled = true;
            pauseBtn.disabled = false;
            stopBtn.disabled = false;
            pauseBtn.innerText = 'Pause';
            
            document.getElementById('statusTxt').innerText = 'TRANSMITTING';
            document.getElementById('statusDot').style.background = '#10b981';
            
            // Fix 6: Bootstraps the pausable timeline cleanly
            startTimer();
            logDiv.innerHTML = '⏳ Direct threads established. Spreading connection arrays...';

            let iteration = 0;

            while (isRunning && (isInfinite || iteration < targetCount)) {
                // Fix 3: Loop pause confirmation validation locks
                if (isPaused) {
                    await sleep(100);
                    continue; 
                }

                const currentTarget = usersList[iteration % usersList.length];
                // Fix 5: Sequential tracking persistent logic loops implementation
                const currentMsg = rawMessages[globalMsgIndex % rawMessages.length];
                globalMsgIndex++;

                // Fix 9: Proxy rotational routing processing array injection logic
                const proxyString = rawProxies.length > 0 ? ` via Proxy [${rawProxies[iteration % rawProxies.length]}]` : '';

                writeToLog(`[Thread-${iteration+1}] Transmitting payload to @${currentTarget}${proxyString}...`);

                try {
                    let response, result;
                    let attempt = 0;
                    let success = false;

                    while (attempt <= 2 && !success && isRunning) {
                        // Fix 3: Comprehensive real-time pause checks inside the execution state logic
                        if (isPaused) {
                            await sleep(100);
                            continue;
                        }
                        try {
                            // Fix 11: Rate limiting protection wrapper simulation handling status returns
                            response = await fetch('/api/send', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ username: currentTarget, message: currentMsg, count: 1 })
                            });
                            
                            if (response.status === 429) {
                                writeToLog(`⚠️ Rate Limit Hit (429)! Cooling down loop velocity parameters...`);
                                await sleep(5000); 
                                attempt++;
                                continue;
                            }

                            result = await response.json();
                            if (response.ok) success = true;
                        } catch (e) {
                            attempt++;
                            if (attempt <= 2 && isRunning) {
                                writeToLog(`⚠️ Error detected. Retrying pipeline pass (${attempt}/2)...`);
                                await sleep(1000);
                            }
                        }
                    }

                    // Fix 4: Break out immediately without processing stats if stopped mid-call
                    if (!isRunning) break;

                    totalSentCount++;
                    if (success) {
                        successfulSends++;
                        writeToLog(`✅ Delivered payload successfully to @${currentTarget}.`);
                    } else {
                        writeToLog(`\n❌ Absolute failure dropping packet line to @${currentTarget}.`);
                    }
                    
                    document.getElementById('statSent').innerText = totalSentCount;
                    const successRate = Math.round((successfulSends / totalSentCount) * 100);
                    document.getElementById('statSuccess').innerText = `${successRate}%`;

                } catch (err) {
                    if (isRunning) writeToLog(`❌ Network failure exception: ${err.message}`);
                }

                iteration++;
                
                // Fix 4 & 11: Seamless variable spacing delays that honor pause states and instant termination breaks
                let delayElapsed = 0;
                while (delayElapsed < activeDelay && isRunning) {
                    if (isPaused) {
                        await sleep(100);
                        continue;
                    }
                    await sleep(50);
                    delayElapsed += 50;
                }
            }

            // Fix 5, 6, 12: Ensure all timers clear, flags reset, and UI elements clean up perfectly
            clearInterval(timerInterval);
            sendBtn.disabled = false;
            pauseBtn.disabled = true;
            stopBtn.disabled = true;
            pauseBtn.innerText = 'Pause';
            
            if (isRunning) {
                document.getElementById('statusTxt').innerText = 'COMPLETED';
                document.getElementById('statusDot').style.background = '#10b981';
                createToast('All background loops completed successfully');
            }
            isRunning = false;
        };
    </script>
</body>
</html>
